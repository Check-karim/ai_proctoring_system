{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="auth-page">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-size: 8rem; font-weight: 700; background: linear-gradient(135deg, var(--danger-color), #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;">
            500
        </div>
        <h2 style="margin-bottom: 1rem;">Server Error</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            Something went wrong on our end. Please try again later.
        </p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
            Go to Homepage
        </a>
    </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}
