{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="auth-page">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-size: 8rem; font-weight: 700; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;">
            404
        </div>
        <h2 style="margin-bottom: 1rem;">Page Not Found</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
            Go to Homepage
        </a>
    </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}
